<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0f172a"/>
  <!-- Simplified France hexagon outline -->
  <polygon points="300,80 550,80 680,200 680,400 550,520 300,520 170,400 170,200" fill="#1e3a5f" stroke="#3b82f6" stroke-width="3"/>
  <!-- Regions -->
  <line x1="300" y1="80" x2="400" y2="300" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="550" y1="80" x2="450" y2="300" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="170" y1="200" x2="350" y2="300" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="200" x2="500" y2="300" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <!-- Department divisions -->
  <line x1="250" y1="150" x2="350" y2="150" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="450" y1="150" x2="550" y2="150" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="220" x2="350" y2="220" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="450" y1="220" x2="550" y2="220" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="350" x2="350" y2="350" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="450" y1="350" x2="550" y2="350" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="350" y1="150" x2="350" y2="350" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="450" y1="150" x2="450" y2="350" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <!-- Major cities -->
  <circle cx="350" cy="180" r="4" fill="#fbbf24"/>
  <text x="340" y="175" text-anchor="end" font-family="sans-serif" font-size="9" fill="#fbbf24">Paris</text>
  <circle cx="280" cy="380" r="3" fill="#fbbf24"/>
  <text x="270" y="380" text-anchor="end" font-family="sans-serif" font-size="8" fill="#fbbf24">Marseille</text>
  <circle cx="520" cy="200" r="3" fill="#fbbf24"/>
  <text x="530" y="195" font-family="sans-serif" font-size="8" fill="#fbbf24">Strasbourg</text>
  <circle cx="350" cy="420" r="3" fill="#fbbf24"/>
  <text x="340" y="420" text-anchor="end" font-family="sans-serif" font-size="8" fill="#fbbf24">Toulouse</text>
  <circle cx="480" cy="300" r="3" fill="#fbbf24"/>
  <text x="490" y="295" font-family="sans-serif" font-size="8" fill="#fbbf24">Lyon</text>
  <circle cx="300" cy="300" r="3" fill="#fbbf24"/>
  <text x="290" y="295" text-anchor="end" font-family="sans-serif" font-size="8" fill="#fbbf24">Clermont-Ferrand</text>
  <!-- Mediterranean Sea label -->
  <text x="280" y="500" font-family="sans-serif" font-size="10" fill="#64748b" font-style="italic">Mer Méditerranée</text>
  <!-- Atlantic label -->
  <text x="120" y="350" font-family="sans-serif" font-size="10" fill="#64748b" font-style="italic" transform="rotate(-90 120 350)">Océan Atlantique</text>

  <text x="400" y="550" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">
    Carte administrative — 96 départements métropolitains
  </text>
</svg>
