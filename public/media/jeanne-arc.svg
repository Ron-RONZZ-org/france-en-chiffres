<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#1c1917"/>
  <!-- Figure -->
  <g transform="translate(300, 100)">
    <!-- Armor body -->
    <rect x="50" y="120" width="100" height="140" rx="8" fill="#a8a29e" stroke="#78716c" stroke-width="2"/>
    <!-- Gorget -->
    <rect x="55" y="110" width="90" height="20" rx="4" fill="#d4d4d4" stroke="#78716c" stroke-width="1"/>
    <!-- Head -->
    <circle cx="100" cy="70" r="40" fill="#f5d6b8"/>
    <!-- Hair -->
    <path d="M60 65 Q70 25 100 20 Q130 25 140 65" fill="#78350f"/>
    <path d="M60 65 Q55 80 58 90" fill="none" stroke="#78350f" stroke-width="6"/>
    <path d="M140 65 Q145 80 142 90" fill="none" stroke="#78350f" stroke-width="6"/>
    <!-- Eyes -->
    <circle cx="85" cy="70" r="4" fill="#1c1917"/>
    <circle cx="115" cy="70" r="4" fill="#1c1917"/>
    <!-- Sword arm -->
    <rect x="150" y="130" width="50" height="12" rx="4" fill="#a8a29e" transform="rotate(-30 175 136)"/>
    <!-- Sword -->
    <rect x="175" y="40" width="6" height="100" rx="2" fill="#eab308" transform="rotate(-30 178 90)"/>
    <polygon points="175,35 178,20 181,35" fill="#eab308" transform="rotate(-30 178 35)"/>
    <!-- Shield arm -->
    <rect x="0" y="130" width="50" height="12" rx="4" fill="#a8a29e" transform="rotate(20 25 136)"/>
    <!-- Shield -->
    <ellipse cx="0" cy="170" rx="35" ry="50" fill="#1d4ed8" stroke="#78716c" stroke-width="2"/>
    <circle cx="0" cy="170" r="12" fill="#eab308"/>
    <!-- Legs -->
    <rect x="60" y="260" width="30" height="80" rx="4" fill="#a8a29e"/>
    <rect x="110" y="260" width="30" height="80" rx="4" fill="#a8a29e"/>
    <!-- Tabard -->
    <rect x="60" y="170" width="80" height="60" fill="#fefce8" stroke="#78716c" stroke-width="1"/>
    <circle cx="100" cy="200" r="8" fill="#eab308"/>
  </g>
  <!-- Banner -->
  <g transform="translate(480, 80)">
    <line x1="0" y1="0" x2="0" y2="300" stroke="#78716c" stroke-width="4"/>
    <rect x="0" y="0" width="100" height="70" fill="#fefce8" stroke="#78716c" stroke-width="1"/>
    <path d="M50 10 L50 60 M20 35 L80 35" stroke="#eab308" stroke-width="3"/>
    <text x="50" y="45" text-anchor="middle" font-family="serif" font-size="12" fill="#eab308">JH</text>
  </g>
  <text x="400" y="520" text-anchor="middle" font-family="serif" font-size="20" fill="#94a3b8">
    Jeanne d'Arc (1412–1431)
  </text>
  <text x="400" y="550" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">
    Héroïne de la guerre de Cent Ans — Librée d'Orléans, 1429
  </text>
</svg>
