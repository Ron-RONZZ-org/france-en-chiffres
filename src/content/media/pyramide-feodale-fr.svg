<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 340" width="660" height="340" role="img" aria-label="Pyramide féodale : hiérarchie du royaume de France">
<defs>
  <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L5,10 L10,0" fill="#6c3483"/></marker>
  <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,10 L5,0 L10,10" fill="#b7950b"/></marker>
</defs>
<rect width="660" height="340" fill="#1a1a2e" rx="8"/>
<text x="330" y="24" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">Pyramide féodale</text>
<polygon points="264,42 396,42 435.6,82 224.39999999999998,82" fill="#1a5276" stroke="#2980b9" stroke-width="1.5"/>
